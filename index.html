<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simon Says Game</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Name Input Overlay -->
    <div class="overlay blur-bg" id="nameOverlay">
        <div class="overlay-content">
            <h2>Welcome to Simon Says!</h2>
            <p>Enter your name to begin:</p>
            <input type="text" id="playerNameInput" placeholder="Your name" required />
            <button id="startGameBtn">Start Game</button>
        </div>
    </div>

    <!-- Leaderboard Overlay -->
    <div class="overlay blur-bg" id="leaderboardOverlay" style="display: none;">
        <div class="overlay-content">
            <h2>🏆 Leaderboard</h2>
            <ul id="leaderboardList"></ul>
            <button id="closeLeaderboardBtn">Close</button>
        </div>
    </div>

    <!-- Game UI -->
    <main>
        <h1>Simon Says Game</h1>
        <h2 id="game-status">Tap anywhere to start the game</h2>
        <div class="high-score">High Score: <span id="high-score-display">0</span></div>

        <div class="btn-container">
            <div class="btn red" id="red" aria-label="Red Button"></div>
            <div class="btn yellow" id="yellow" aria-label="Yellow Button"></div>
            <div class="btn green" id="green" aria-label="Green Button"></div>
            <div class="btn purple" id="purple" aria-label="Purple Button"></div>
        </div>
    </main>

    <!-- Custom Message Box -->
    <div class="message-box-overlay" id="messageBoxOverlay">
        <div class="message-box-content">
            <h3 id="messageBoxTitle"></h3>
            <p id="messageBoxText"></p>
            <button id="messageBoxButton">OK</button>
            <button id="getMemoryTipBtn" class="gemini-btn" style="display: none;">Get a Memory Tip ✨</button>
            <button id="getGameAnalysisBtn" class="analysis-btn" style="display: none;">Game Analysis ✨</button>
        </div>
    </div>

    <!-- JavaScript -->
    <script src="app.js"></script>
</body>
</html>
